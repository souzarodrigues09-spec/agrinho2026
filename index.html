<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Cup: Futuro Sustentável</title>
    <style>
        :root {
            --fifa-gold: #e2b35a;
            --fifa-blue: #020e2e;
            --field-green: #2d6a4f;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: var(--fifa-blue);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal */
        .game-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: linear-gradient(to bottom, #041d5a, #020e2e);
            border: 4px solid var(--fifa-gold);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Slide / Carta FIFA */
        .card-agro {
            background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
            height: 250px;
            border-radius: 15px;
            border: 3px solid var(--fifa-gold);
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-end;
        }

        .card-overlay {
            background: rgba(0,0,0,0.6);
            width: 100%;
            padding: 10px;
            border-radius: 0 0 12px 12px;
            text-align: center;
            font-weight: bold;
            color: var(--fifa-gold);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .question-box h2 {
            font-size: 1.1rem;
            text-align: center;
            min-height: 60px;
        }

        /* Botões de Chute (Respostas) */
        .options-grid {
            display: grid;
            gap: 10px;
        }

        .btn-kick {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--fifa-gold);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 14px;
        }

        .btn-kick:hover {
            background: var(--fifa-gold);
            color: var(--fifa-blue);
        }

        /* Placar */
        .scoreboard {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--fifa-gold);
            color: var(--fifa-blue);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hidden { display: none; }

        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none;
        }

        .goal { color: #00ff00; text-shadow: 0 0 20px #00ff00; }
        .miss { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="scoreboard">AGRO CUP: <span id="score">0</span></div>

        <div id="game-screen">
            <div class="stats-bar">
                <span>Partida: <span id="q-count">1</span>/10</span>
                <span>Clima: Sustentável</span>
            </div>

            <div class="card-agro" id="card-img">
                <div class="card-overlay" id="card-label">TECNOLOGIA NO CAMPO</div>
            </div>

            <div class="question-box">
                <h2 id="question-text">Como o plantio direto ajuda o meio ambiente?</h2>
            </div>

            <div class="options-grid" id="options-btns">
                </div>
        </div>

        <div id="result-screen" class="hidden" style="text-align: center; padding-top: 50px;">
            <h1 style="color: var(--fifa-gold);">FIM DE JOGO!</h1>
            <p>Seu saldo de gols sustentáveis:</p>
            <div style="font-size: 80px; margin: 20px 0;" id="final-score">0</div>
            <button onclick="location.reload()" style="background: var(--fifa-gold); border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer;">NOVA TEMPORADA</button>
        </div>
    </div>

    <div id="feedback"></div>

    <script>
        const questions = [
            {
                q: "Qual técnica mantém a palhada sobre o solo para evitar erosão?",
                img: "https://images.unsplash.com/photo-1592982537447-6f2a6a0c3c1b?w=500",
                label: "MANEJO DE SOLO",
                options: ["Plantio Direto", "Aragem Profunda", "Queimada", "Desmatamento"],
                correct: 0
            },
            {
                q: "O que a sigla ILPF representa no agro sustentável?",
                img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500",
                label: "INTEGRAÇÃO",
                options: ["Indústria e Logística", "Lavoura, Pecuária e Floresta", "Irrigação e Luz", "Inovação e Lucro"],
                correct: 1
            },
            {
                q: "O uso de drones na lavoura serve principalmente para:",
                img: "https://images.unsplash.com/photo-1473415781819-175f02f903a2?w=500",
                label: "PRECISÃO",
                options: ["Espantar pássaros", "Transportar gado", "Monitorar pragas com precisão", "Substituir o sol"],
                correct: 2
            },
            {
                q: "Bioinsumos são defensivos baseados em:",
                img: "https://images.unsplash.com/photo-1589923188900-85dae523342b?w=500",
                label: "BIOECONOMIA",
                options: ["Petróleo", "Metais Pesados", "Organismos Vivos", "Plástico"],
                correct: 2
            },
            {
                q: "A energia solar no campo reduz a dependência de:",
                img: "https://images.unsplash.com/photo-1509391366360-fe5bb658582f?w=500",
                label: "ENERGIA LIMPA",
                options: ["Água da chuva", "Combustíveis Fósseis", "Sementes", "Vento"],
                correct: 1
            },
            {
                q: "O que protege os rios e nascentes dentro das fazendas?",
                img: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=500",
                label: "RECURSOS HÍDRICOS",
                options: ["Cercas elétricas", "Asfalto", "Matas Ciliares", "Muros de concreto"],
                correct: 2
            },
            {
                q: "Qual o objetivo da Agricultura de Precisão?",
                img: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=500",
                label: "EFICIÊNCIA",
                options: ["Gastar mais adubo", "Reduzir desperdício de insumos", "Aumentar a mão de obra", "Produzir menos"],
                correct: 1
            },
            {
                q: "A sucessão familiar no agro garante:",
                img: "https://images.unsplash.com/photo-1507484467459-0c294792657d?w=500",
                label: "FUTURO",
                options: ["O fim da fazenda", "A venda da terra", "Continuidade e inovação", "Apenas lucros antigos"],
                correct: 2
            },
            {
                q: "Biodigestores transformam resíduos animais em:",
                img: "https://images.unsplash.com/photo-1545199969-952924376c75?w=500",
                label: "REUSO",
                options: ["Lixo", "Biogás e Fertilizante", "Plástico", "Alimento"],
                correct: 1
            },
            {
                q: "O equilíbrio entre produção e meio ambiente gera:",
                img: "https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=500",
                label: "SUSTENTABILIDADE",
                options: ["Escassez", "Degradação", "Segurança Alimentar", "Conflitos"],
                correct: 2
            }
        ];

        let currentQ = 0;
        let score = 0;

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('q-count').innerText = currentQ + 1;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('card-img').style.backgroundImage = `url('${data.img}')`;
            document.getElementById('card-label').innerText = data.label;

            const optionsDiv = document.getElementById('options-btns');
            optionsDiv.innerHTML = '';

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-kick';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const feedback = document.getElementById('feedback');
            const btns = document.querySelectorAll('.btn-kick');
            btns.forEach(b => b.disabled = true);

            if(index === questions[currentQ].correct) {
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerText = "GOOOL!";
                feedback.className = "goal";
            } else {
                feedback.innerText = "DEFENDEU!";
                feedback.className = "miss";
            }

            setTimeout(() => {
                feedback.innerText = "";
                currentQ++;
                if(currentQ < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        loadQuestion();
    </script>
</body>
</html>
